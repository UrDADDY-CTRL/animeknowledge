<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime Knowledge Test</title>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:40px;
}

#quizBox{
max-width:600px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
box-shadow:0 0 30px black;
}

button{
width:100%;
margin:10px 0;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2b2b2b;
color:white;
transition:0.2s;
}

button:hover{
background:#444;
}

#level{
font-size:22px;
margin-bottom:15px;
}

#prank{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<h1>Karbit Test☠️</h1>

<div id="quizBox">

<div id="level">Level 1</div>

<div id="question"></div>

<div id="answers"></div>

</div>


<div id="prank">

<video id="rickVideo" playsinline>
<source src="rickroll.mp4" type="video/mp4">
</video>

</div>


<script>

let level = 1

const questions = [

{
q:"Siapa Hokage ke-7?",
a:["Naruto","Kakashi","Minato","Tsunade"],
correct:0
},

{
q:"Kapten Straw Hat Pirates?",
a:["Zoro","Luffy","Sanji","Shanks"],
correct:1
},

{
q:"Rival utama Goku?",
a:["Vegeta","Frieza","Beerus","Cell"],
correct:0
},

{
q:"Anime dengan Titan?",
a:["Bleach","Attack on Titan","Naruto","Chainsaw Man"],
correct:1
},

{
q:"Karakter utama Death Note?",
a:["Light","L","Near","Ryuk"],
correct:0
}

]


function loadLevel(){

document.getElementById("level").innerText="Level "+level

let q = questions[level-1]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((ans,i)=>{

html+=`<button onclick="answer(${i})">${ans}</button>`

})

document.getElementById("answers").innerHTML=html

}


function answer(i){

level++

if(level>5){

rickroll()

}else{

loadLevel()

}

}


function rickroll(){

document.getElementById("quizBox").style.display="none"

document.getElementById("prank").style.display="block"

let video=document.getElementById("rickVideo")

video.volume=1

video.play()

if(video.requestFullscreen){

video.requestFullscreen()

}

audioBooster(video)

}



function audioBooster(video){

let ctx = new AudioContext()

let source = ctx.createMediaElementSource(video)

let gain = ctx.createGain()

let distortion = ctx.createWaveShaper()



gain.gain.value = 5   // booster 500%



function makeDistortionCurve(amount){

let n_samples = 44100

let curve = new Float32Array(n_samples)

for (let i=0;i<n_samples;i++){

let x = i*2/n_samples-1

curve[i]=(3+amount)*x*20*Math.PI/(Math.PI+amount*Math.abs(x))

}

return curve

}



distortion.curve = makeDistortionCurve(400)

distortion.oversample = '4x'


source.connect(gain)
gain.connect(distortion)
distortion.connect(ctx.destination)

}


loadLevel()

</script>

</body>
</html>
