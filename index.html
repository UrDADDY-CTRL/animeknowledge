<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anime Knowledge Test</title>

<style>

body{
font-family:Arial;
background:#0d0d0d;
color:white;
text-align:center;
margin:0;
overflow:hidden;
}

h1{
margin-top:40px;
}

#quizBox{
max-width:600px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
box-shadow:0 0 30px black;
}

button{
width:100%;
margin:10px 0;
padding:15px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2b2b2b;
color:white;
transition:0.2s;
}

button:hover{
background:#444;
}

#level{
font-size:22px;
margin-bottom:15px;
}

#loadingScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
}

#loadingText{
font-size:30px;
margin-top:20%;
}

#virus{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
color:white;
z-index:99999;
animation:flash 0.2s infinite alternate;
}

@keyframes flash{
from{background:#700}
to{background:#200}
}

.glitch{
font-size:40px;
text-shadow:3px 3px red,-3px -3px blue;
}

.shake{
animation:shake 0.05s infinite;
}

@keyframes shake{
0%{transform:translate(5px,5px)}
25%{transform:translate(-5px,-5px)}
50%{transform:translate(5px,-5px)}
75%{transform:translate(-5px,5px)}
100%{transform:translate(5px,5px)}
}

#matrixScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff00;
z-index:999999;
}

#terminal{
position:absolute;
top:10%;
left:10%;
width:80%;
height:60%;
background:black;
border:2px solid #00ff00;
padding:20px;
overflow:auto;
font-family:monospace;
}

#downloadBox{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:60%;
border:2px solid red;
}

#downloadBar{
width:0%;
height:30px;
background:red;
line-height:30px;
}

#prank{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999999;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<h1>Karbit Test ☠️</h1>

<div id="quizBox">

<div id="level">Level 1</div>

<div id="question"></div>

<div id="answers"></div>

</div>


<div id="loadingScreen">
<div id="loadingText">Scanning system... 0%</div>
</div>


<div id="virus">

<h1 class="glitch">⚠ SYSTEM INFECTED ⚠</h1>

<p>Virus detected...</p>
<p>Accessing files...</p>
<p>Uploading data...</p>

</div>


<div id="matrixScreen">

<canvas id="matrixCanvas"></canvas>

<div id="terminal"></div>

<div id="downloadBox">
<div id="downloadBar">0%</div>
</div>

</div>


<div id="prank">

<video id="rickVideo" playsinline loop>
<source src="rickroll.mp4" type="video/mp4">
</video>

<audio id="alarmSound" loop>
<source src="alarm.mp3" type="audio/mpeg">
</audio>

</div>


<script>

let level = 1
let questionIndex = 0

const questions=[

{q:"Siapa Hokage ke-7?",a:["Naruto","Kakashi","Minato","Tsunade"]},
{q:"Kapten Straw Hat Pirates?",a:["Zoro","Luffy","Sanji","Shanks"]},
{q:"Rival utama Goku?",a:["Vegeta","Frieza","Beerus","Cell"]},
{q:"Anime dengan Titan?",a:["Bleach","Attack on Titan","Naruto","Chainsaw Man"]},
{q:"Karakter utama Death Note?",a:["Light","L","Near","Ryuk"]},

{q:"Nama pedang Ichigo?",a:["Zangetsu","Enma","Wado","Samehada"]},
{q:"Siapa sensei tim 7?",a:["Jiraiya","Kakashi","Guy","Asuma"]},
{q:"Nama organisasi Naruto?",a:["Akatsuki","Espada","Marines","Survey Corps"]},
{q:"Anime bajak laut?",a:["Bleach","One Piece","Fairy Tail","Black Clover"]},
{q:"Nama iblis Chainsaw Man?",a:["Pochita","Kurama","Ryuk","Sukuna"]},

{q:"Nama desa Naruto?",a:["Konoha","Suna","Kiri","Kumo"]},
{q:"Siapa rival Luffy?",a:["Kid","Law","Zoro","Buggy"]},
{q:"Siapa ayah Goku?",a:["Bardock","Vegeta","Raditz","Gohan"]},
{q:"Kapten Levi berasal dari anime?",a:["AOT","Bleach","Naruto","Jujutsu"]},
{q:"Siapa pengguna notebook?",a:["Light","L","Near","Mello"]},

{q:"Apa nama mode Naruto terkuat?",a:["Baryon","Sage","KCM","Six Path"]},
{q:"Siapa Yonko wanita?",a:["Big Mom","Boa","Robin","Yamato"]},
{q:"Nama ras Frieza?",a:["Unknown","Saiyan","Namek","Android"]},
{q:"Apa nama tembok terbesar AOT?",a:["Maria","Rose","Sina","Alpha"]},
{q:"Shinigami Apple lover?",a:["Ryuk","Rem","Near","L"]},

{q:"Siapa guru Jiraiya?",a:["Hiruzen","Minato","Tobirama","Danzo"]},
{q:"Nama pedang Zoro ketiga?",a:["Sandai","Enma","Shusui","Wado"]},
{q:"Planet asal Vegeta?",a:["Planet Vegeta","Earth","Namek","Beerus"]},
{q:"Siapa titan attack sebelum Eren?",a:["Grisha","Levi","Armin","Zeke"]},
{q:"Nama detektif penerus L?",a:["Near","Light","Soichiro","Misa"]}

]

function loadQuestion(){

document.getElementById("level").innerText="Level "+level

let q=questions[questionIndex]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach(ans=>{
html+=`<button onclick="answer()">${ans}</button>`
})

document.getElementById("answers").innerHTML=html

}

function answer(){

questionIndex++

if(questionIndex>=questions.length){

enterFullscreen()
fakeLoading()
return

}

level=Math.floor(questionIndex/5)+1
loadQuestion()

}

function enterFullscreen(){

let elem=document.documentElement

if(elem.requestFullscreen){
elem.requestFullscreen()
}

}

function fakeLoading(){

document.getElementById("quizBox").style.display="none"
document.getElementById("loadingScreen").style.display="block"

let percent=0

let interval=setInterval(()=>{

percent++

document.getElementById("loadingText").innerText="Scanning system... "+percent+"%"

if(percent>=100){

clearInterval(interval)
virusScreen()

}

},40)

}

function virusScreen(){

document.getElementById("loadingScreen").style.display="none"
document.getElementById("virus").style.display="block"

document.body.classList.add("shake")

setTimeout(startHackerMode,3000)

}

function startHackerMode(){

document.getElementById("virus").style.display="none"
document.getElementById("matrixScreen").style.display="block"

startMatrix()
fakeTerminal()
fakeDownload()

let alarm=document.getElementById("alarmSound")
alarm.play()

setTimeout(rickroll,8000)

}

function fakeDownload(){

let bar=document.getElementById("downloadBar")
let percent=0

let interval=setInterval(()=>{

percent++
bar.style.width=percent+"%"
bar.innerText=percent+"%"

if(percent>=100){
clearInterval(interval)
}

},60)

}

function fakeTerminal(){

let terminal=document.getElementById("terminal")

let lines=[

"Connecting to target...",
"Bypassing firewall...",
"Accessing system files...",
"Downloading private data...",
"Uploading virus...",
"Injecting malware...",
"System takeover ready..."

]

let i=0

let interval=setInterval(()=>{

let p=document.createElement("p")
p.innerText=lines[i]

terminal.appendChild(p)
terminal.scrollTop=terminal.scrollHeight

i++

if(i>=lines.length){
clearInterval(interval)
}

},700)

}

function startMatrix(){

let canvas=document.getElementById("matrixCanvas")
let ctx=canvas.getContext("2d")

canvas.height=window.innerHeight
canvas.width=window.innerWidth

let letters="01".split("")

let fontSize=14
let columns=canvas.width/fontSize
let drops=[]

for(let x=0;x<columns;x++)
drops[x]=1

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#0F0"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)]

ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++

}

}

setInterval(draw,33)

}

function rickroll(){

document.getElementById("matrixScreen").style.display="none"
document.getElementById("prank").style.display="block"

let video=document.getElementById("rickVideo")

video.volume=1
video.loop=true
video.play()

audioBooster(video)

}

function audioBooster(video){

let ctx=new AudioContext()
let source=ctx.createMediaElementSource(video)

let gain=ctx.createGain()
gain.gain.value=5

source.connect(gain)
gain.connect(ctx.destination)

}

loadQuestion()

</script>

</body>
</html>
